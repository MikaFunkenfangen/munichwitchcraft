<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Willkommen im Kreis — Practical Magic, Munich Witchcraft.">
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#080807">
<title>Willkommen im Kreis — Practical Magic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
@font-face{font-family:"Hermissoul";src:url("../../assets/fonts/hermis-soul/Hermissoul-Regular.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:"CCSBjork";src:url("../../assets/fonts/bjork-serif/CCSBjork.otf") format("opentype");font-weight:400;font-style:normal;font-display:swap}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#080807;--cream:#e8e2d4;--cream-dim:#a8a090;
  --gold:#c9a96e;--gold-dim:#7a6035;--white:#f0ebe0;
  --serif:"Cormorant Garamond",Georgia,serif;
  --sans:"Jost",sans-serif;
  --display:"Hermissoul","CCSBjork",Georgia,serif;
}
html,body{min-height:100%}
body{background:linear-gradient(180deg,#0a1020 0%,#070a12 55%,#040406 100%);color:var(--cream);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;text-align:center;overflow-x:hidden}
.wk-moon{width:clamp(80px,14vmin,120px);height:clamp(80px,14vmin,120px);border-radius:50%;background:radial-gradient(circle at 38% 38%,#f4ecd8 0%,#d9c79e 45%,#b89b6a 100%);box-shadow:0 0 60px rgba(201,169,110,.4),0 0 130px rgba(201,169,110,.2);margin-bottom:clamp(1.8rem,4vw,2.6rem);animation:moonFloat 9s ease-in-out infinite}
@keyframes moonFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.wk-brand{font-family:var(--display);font-size:clamp(1.3rem,3vw,1.9rem);color:var(--gold);letter-spacing:.06em;margin-bottom:.5rem}
.wk-sub{font-family:var(--sans);font-size:.7rem;font-weight:300;letter-spacing:.28em;text-transform:uppercase;color:var(--cream-dim);margin-bottom:clamp(1.8rem,4vw,2.6rem);opacity:.7}
.wk-title{font-family:var(--serif);font-size:clamp(1.6rem,4vw,2.6rem);font-weight:300;font-style:italic;color:var(--white);line-height:1.3;margin-bottom:1.2rem}
.wk-text{font-family:var(--serif);font-size:clamp(1.05rem,1.7vw,1.25rem);font-weight:300;line-height:1.8;color:var(--cream);max-width:460px;margin:0 auto clamp(2rem,4vw,2.8rem);opacity:.85}
.wk-pw-label{font-family:var(--sans);font-size:.68rem;font-weight:300;letter-spacing:.26em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:.8rem}
.wk-pw{display:inline-block;font-family:var(--serif);font-size:clamp(1.6rem,4vw,2.4rem);font-weight:400;font-style:italic;letter-spacing:.06em;color:var(--gold);padding:clamp(.9rem,2vw,1.2rem) clamp(1.8rem,4vw,2.8rem);border:1px solid rgba(201,169,110,.35);border-radius:4px;background:rgba(201,169,110,.06);text-shadow:0 0 20px rgba(201,169,110,.3);margin-bottom:clamp(2.2rem,5vw,3rem);user-select:all}
.wk-btn{display:inline-flex;align-items:center;gap:.6rem;font-family:var(--serif);font-size:clamp(.95rem,1.3vw,1.1rem);font-weight:300;font-style:italic;letter-spacing:.1em;color:var(--cream);text-decoration:none;padding:clamp(.8rem,1.5vw,1rem) clamp(2rem,4vw,3rem);border-radius:60px;border:1px solid rgba(201,169,110,.3);background:linear-gradient(135deg,rgba(201,169,110,.1),rgba(201,169,110,.03));transition:all .4s}
.wk-btn:hover{color:var(--gold);border-color:rgba(201,169,110,.55);transform:scale(1.03)}
.wk-foot{margin-top:clamp(2.5rem,5vw,3.5rem)}
.wk-foot a{font-family:var(--sans);font-size:.75rem;letter-spacing:.1em;color:var(--cream-dim);text-decoration:none;opacity:.7;transition:color .3s}
.wk-foot a:hover{color:var(--gold)}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
</style>
</head>
<body>
  <div class="wk-moon" aria-hidden="true"></div>
  <div class="wk-brand">Munich Witchcraft</div>
  <div class="wk-sub">Practical Magic</div>
  <h1 class="wk-title">Willkommen im Kreis.</h1>
  <p class="wk-text">Dein Abo ist bestätigt. Hier ist dein Zugangswort für Practical Magic &mdash; bewahre es gut auf, du findest es auch in deiner Willkommens-Mail.</p>
  <div class="wk-pw-label">Dein Passwort</div>
  <div class="wk-pw">LetTheMagicHappen</div>
  <div>
    <a class="wk-btn" href="../">Zu Practical Magic &rarr;</a>
  </div>
  <div class="wk-foot"><a href="../../">&larr; Munich Witchcraft</a></div>
</body>
</html>
